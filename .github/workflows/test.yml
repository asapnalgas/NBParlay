name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pytest pytest-cov pytest-xdist
          pip install pandas numpy scikit-learn lightgbm requests

      - name: Lint with basic syntax check
        run: |
          python -m py_compile nba_model/app.py
          python -m py_compile nba_model/src/*.py

      - name: Run unit tests with coverage
        run: |
          cd nba_model
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=html --cov-report=xml -n auto
        continue-on-error: true

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: nba_model/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Generate coverage badge
        if: always()
        run: |
          cd nba_model
          echo "Coverage report generated in htmlcov/index.html"
          if [ -d htmlcov ]; then
            python -c "
import re
import os
with open('htmlcov/index.html', 'r') as f:
    content = f.read()
    match = re.search(r'<span class=.pc_cov.>([0-9]+)%', content)
    if match:
        coverage = match.group(1)
        print(f'::notice::Overall coverage: {coverage}%')
            "
          fi

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Python version: ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed - check coverage reports above" >> $GITHUB_STEP_SUMMARY
